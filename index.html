<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UtopLearn — Intro</title>

  <!-- Google Fonts – Lobster Two Bold -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lobster+Two:wght@700&display=swap"
    rel="stylesheet"
  />

  <!-- GSAP 3 core + plugins from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://assets.codepen.io/16327/SplitText3.min.js"></script>

  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #4D1F13;
      font-family: "Lobster Two", cursive;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    :root {
      --logo-size: 180px;
    }

    /* ── Stage ─────────────────────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #051317;
      --glow-opacity: 0;
    }

    /* Subtle radial glow behind the logo */
    .stage::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(6, 40, 43, 1) 0%,
        rgba(7, 27, 32, 1) 40%,
        transparent 70%
      );
      opacity: var(--glow-opacity, 0);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Logo ──────────────────────────────────────────── */
    .logo-wrapper {
      position: relative;
      z-index: 1;
      width: var(--logo-size);
      height: var(--logo-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrapper svg,
    .logo-wrapper img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      will-change: transform, opacity, filter;
      transform-origin: 50% 50%;
    }
    .logo-wrapper img {
      object-fit: contain;
    }

    .logo-svg {
      display: block;
      overflow: visible;
    }

    .logo-path {
      fill: #080615;
      stroke: #db6482;
      stroke-width: 16;
      stroke-linejoin: round;
      stroke-linecap: round;
    }


    /* Soft reflection under the logo */
    .logo-reflection {
      position: absolute;
      bottom: calc(var(--logo-size) * -0.33);
      width: var(--logo-size);
      height: calc(var(--logo-size) * 0.33);
      background: linear-gradient(
        to bottom,
        rgba(219, 100, 130, 0.08),
        transparent
      );
      border-radius: 50%;
      filter: blur(20px);
      opacity: 0;
      z-index: 0;
    }

    /* ── Text ──────────────────────────────────────────── */
    .tagline {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      text-align: center;
      overflow: visible;
    }

    .tagline-line {
      display: block;
      color: #1470f2;
      letter-spacing: -0.02em;
      line-height: 1.2;
      will-change: transform, opacity;
    }

    .tagline-line:first-child {
      font-size: clamp(1.1rem, 2.4vw, 1.7rem);
      font-weight: 600;
    }

    .tagline-line:last-child {
      font-size: clamp(0.8rem, 2.0vw, 1.1rem);
      font-weight: 300;
      color: #1470f2;
      margin-top: 8px;
    }

    .tagline-line span {
      display: inline-block;
      will-change: transform, opacity;
    }

    /* ── Divider line ─────────────────────────────────── */
    .divider {
      width: 48px;
      height: 1px;
      background: rgba(245, 245, 247, 0.2);
      margin-top: 16px;
      will-change: transform, opacity;
      z-index: 1;
    }

    /* ── Responsive tweaks ────────────────────────────── */
    @media (max-width: 600px) {
      :root {
        --logo-size: 130px;
      }

      .tagline {
        margin-top: 18px;
        padding: 0 24px;
      }
    }
  </style>
</head>

    <!-- Divider -->

    <!-- Tagline -->
    <div class="tagline">
      <span class="tagline-line" id="line1">Improve Your English,</span>
      <span class="tagline-line" id="line2">Speak Confidently</span>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════════════════
       Logo reveal: stroke draw-in → fill → SVG→PNG crossfade → tagline
       ══════════════════════════════════════════════════════ */

    if (window.SplitText) {
      gsap.registerPlugin(SplitText);
    }

    const logoSvg  = document.querySelector("#logoSvg");
    const logoPng  = document.querySelector("#logoPng");
    const logoPath = document.querySelector("#logoPath");
    const stage    = document.querySelector(".stage");

    // Split tagline lines for character animation
    const split1 = new SplitText('#line1', { type: 'chars' });
    const split2 = new SplitText('#line2', { type: 'chars' });
    const line1Chars = split1.chars;
    const line2Chars = split2.chars;

    // ─ Stroke draw-in setup ──────────────────────────────
    const pathLen = logoPath.getTotalLength();
    gsap.set(logoPath, {
      strokeDasharray: pathLen,
      strokeDashoffset: pathLen,
      fillOpacity: 0,
      strokeOpacity: 0,
    });

    // ─ Initial element states ────────────────────────────
    gsap.set(logoSvg,  { opacity: 1, scale: 0.95, transformOrigin: "50% 50%" });
    gsap.set(logoPng,  { opacity: 0, scale: 0.98, transformOrigin: "50% 50%" });
    gsap.set("#logoReflection", { opacity: 0 });
    gsap.set("#divider", { opacity: 0, scaleX: 0, transformOrigin: "50% 50%" });
    gsap.set(line1Chars, { opacity: 0, y: 40 });
    gsap.set(line2Chars, { opacity: 0, y: 40 });

    // Glow proxy — drives the CSS custom property on .stage::before
    const glowProxy = { opacity: 0 };
    function updateGlow() {
      stage.style.setProperty("--glow-opacity", glowProxy.opacity);
    }

    // ─ Master timeline ───────────────────────────────────
    const tl = gsap.timeline({ delay: 0.35 });

    tl
      // Phase 1 — Ambient glow fade-in + SVG scale-in
      .to(glowProxy, {
        opacity: 0.5,
        duration: 0.8,
        ease: "power1.inOut",
        onUpdate: updateGlow,
      })
      .to(logoSvg, {
        scale: 1,
        duration: 0.8,
        ease: "power2.out",
      }, "<")

      // Phase 2 — Stroke draw-in
      .to(logoPath, {
        strokeOpacity: 1,
        duration: 0.3,
        ease: "power1.in",
      }, "<0.2")
      .to(logoPath, {
        strokeDashoffset: 0,
        duration: 2.4,
        ease: "power2.inOut",
      }, "<")

      // Phase 3 — Fill reveal (starts before stroke finishes)
      .to(logoPath, {
        fillOpacity: 1,
        duration: 1.0,
        ease: "power3.inOut",
      }, "-=0.8")

      // Phase 4 — Glow pulse with fill
      .to(glowProxy, {
        opacity: 0.7,
        duration: 0.6,
        ease: "power2.out",
        onUpdate: updateGlow,
      }, "<")
      .to(glowProxy, {
        opacity: 0.3,
        duration: 0.8,
        ease: "power2.inOut",
        onUpdate: updateGlow,
      })

      // Phase 5 — Brief hold with breathing glow
      .to(glowProxy, {
        opacity: 0.6,
        duration: 0.6,
        ease: "sine.inOut",
        onUpdate: updateGlow,
      })
      .to(glowProxy, {
        opacity: 0.25,
        duration: 0.6,
        ease: "sine.inOut",
        onUpdate: updateGlow,
      })

      // Phase 6 — Crossfade SVG → PNG
      .to(logoSvg, {
        opacity: 0,
        scale: 1.03,
        duration: 1.2,
        ease: "power2.inOut",
      })
      .to(logoPng, {
        opacity: 1,
        scale: 1,
        duration: 1.2,
        ease: "power2.inOut",
      }, "<")
      .to(glowProxy, {
        opacity: 0.45,
        duration: 1.2,
        ease: "power2.inOut",
        onUpdate: updateGlow,
      }, "<")

      // Phase 7 — Final glow breath on PNG
      .to(glowProxy, {
        opacity: 0.2,
        duration: 1.0,
        ease: "sine.inOut",
        onUpdate: updateGlow,
      })

      // Phase 8 — Reflection, divider, and tagline
      .to("#logoReflection", {
        opacity: 1,
        duration: 0.9,
        ease: "power2.inOut",
      }, "-=0.5")
      .to("#divider", {
        opacity: 1,
        scaleX: 1,
        duration: 0.8,
        ease: "power3.inOut",
      }, "-=0.4")
      .to(line1Chars, {
        opacity: 1,
        y: 0,
        duration: 0.6,
        stagger: 0.05,
        ease: "back.out(1.7)",
      }, "-=0.35")
      .to(line2Chars, {
        opacity: 1,
        y: 0,
        duration: 0.6,
        stagger: 0.05,
        ease: "back.out(1.7)",
      }, "-=0.5");
  </script>
