  <title>UtopLearn — Intro</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    rel="stylesheet"

  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #4D1F13;
      font-family: "Lobster Two", cursive;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    :root {
      --logo-size: 180px;
    }

    /* ── Stage ─────────────────────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #2f130b;
      --glow-opacity: 0;
    }

    /* Subtle radial glow behind the logo */
    .stage::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(208, 129, 58, 0.25) 0%,
        rgba(113, 54, 24, 0.12) 40%,
        transparent 70%
      );
      opacity: var(--glow-opacity, 0);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Logo ──────────────────────────────────────────── */
    .logo-wrapper {
      position: relative;
      z-index: 1;
      width: var(--logo-size);
      height: var(--logo-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrapper svg,
    .logo-wrapper img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      will-change: transform, opacity, filter;
      transform-origin: 50% 50%;
    }
    .logo-wrapper img {
      object-fit: contain;
    }

    .logo-svg {
      display: block;
      overflow: visible;
    }

    .logo-path {
      fill: #080615;
      stroke: #db6482;
      stroke-width: 16;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .morph-targets {
      visibility: hidden;
      pointer-events: none;
    }

    /* Soft reflection under the logo */
    .logo-reflection {
      position: absolute;
      bottom: calc(var(--logo-size) * -0.33);
      width: var(--logo-size);
      height: calc(var(--logo-size) * 0.33);
      background: linear-gradient(
        to bottom,
        rgba(219, 100, 130, 0.08),
        transparent
      );
      border-radius: 50%;
      filter: blur(20px);
      opacity: 0;
      z-index: 0;
    }

    /* ── Text ──────────────────────────────────────────── */
    .tagline {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      text-align: center;
      overflow: visible;
    }

    .tagline-line {
      display: block;
      color: #1470f2;
      letter-spacing: -0.02em;
      line-height: 1.2;
      will-change: transform, opacity;
    }

    .tagline-line:first-child {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 600;
    }

    .tagline-line:last-child {
      font-size: clamp(1.1rem, 2.4vw, 1.7rem);
      font-weight: 300;
      color: #1470f2;
      margin-top: 8px;
    }

    .tagline-line span {
      display: inline-block;
      will-change: transform, opacity;
    }

    /* ── Divider line ─────────────────────────────────── */
    .divider {
      width: 48px;
      height: 1px;
      background: rgba(245, 245, 247, 0.2);
      margin-top: 32px;
      will-change: transform, opacity;
      z-index: 1;
    }

    /* ── Responsive tweaks ────────────────────────────── */
    @media (max-width: 600px) {
      :root {
        --logo-size: 130px;
      }

      .tagline {
        margin-top: 36px;
        padding: 0 24px;
      }
    }
  </style>

      <img
        src="utoplearn-3d-logo-image-rounded-optimised copy.png"
        alt="UtopLearn Logo"
        id="logoPng"
      />

      <div class="logo-reflection" id="logoReflection"></div>
    </div>

    <!-- Divider -->
    <div class="divider" id="divider"></div>

    <!-- Tagline -->
    <div class="tagline">
      <span class="tagline-line" id="line1">Improve Your English,</span>
      <span class="tagline-line" id="line2">Speak Confidently</span>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════════════════
       Apple-style reveal timeline using GSAP + MorphSVG
       ══════════════════════════════════════════════════════ */

    if (window.MorphSVGPlugin) {
      gsap.registerPlugin(MorphSVGPlugin);
    }
    if (window.SplitText) {
      gsap.registerPlugin(SplitText);
    }

    const logoSvg = document.querySelector("#logoSvg");
    const logoPng = document.querySelector("#logoPng");
    const logoPath = document.querySelector("#logoPath");

    // Store the original logo path data so we can morph back to it
    const originalPathD = logoPath.getAttribute("d");

    // Split tagline lines using GSAP SplitText plugin
    const split1 = new SplitText('#line1', { type: 'chars' });
    const split2 = new SplitText('#line2', { type: 'chars' });
    const line1Chars = split1.chars;
    const line2Chars = split2.chars;

    // Set initial states (GSAP best practice: explicit initial values)
    gsap.set(logoSvg, {
      opacity: 0,
      scale: 0.9,
      filter: "blur(12px) brightness(0.7)",
      transformOrigin: "50% 50%",
    });
    gsap.set(logoPng, {
      opacity: 0,
      scale: 0.98,
      filter: "blur(8px) brightness(0.9)",
      transformOrigin: "50% 50%",
    });
    gsap.set("#logoReflection", {
      opacity: 0,
      scale: 0.95,
      transformOrigin: "50% 50%",
    });
    gsap.set("#divider", { opacity: 0, scaleX: 0, transformOrigin: "50% 50%" });
    gsap.set(line1Chars, { opacity: 0, y: 40 });
    gsap.set(line2Chars, { opacity: 0, y: 40 });

    // Ambient glow element (we animate the pseudo-element via a proxy)
    const glowProxy = { opacity: 0 };
    const stage = document.querySelector(".stage");

    // Master timeline — generous durations for the deliberate Apple cadence
    const tl = gsap.timeline({
      defaults: { ease: "power3.out" },
      delay: 0.35, // brief pause before the show begins
    });

    tl
      // 1 ─ SVG logo reveal
      .to(logoSvg, {
        opacity: 1,
        scale: 1,
        filter: "blur(0px) brightness(1)",
        duration: 1.2,
        ease: "power2.out",
      })

      // 2 ─ Ambient glow behind logo
      .to(
        glowProxy,
        {
          opacity: 1,
          duration: 1.1,
          ease: "power2.inOut",
          onUpdate() {
            stage.style.setProperty("--glow-opacity", glowProxy.opacity);
          },
        },
        "-=0.9"
      )

      // 3 ─ Subtle scale breath before morphing
      .to(
        logoSvg,
        {
          scale: 1.02,
          duration: 1.2,
          ease: "sine.inOut",
        },
        "-=0.8"
      )

      // 4 ─ Morph sequence: book → pen → hourglass → certificate
      .to(
        logoPath,
        {
          duration: 0.9,
          morphSVG: { shape: "#morphBook", shapeIndex: "auto" },
          fill: "#141026",
          stroke: "#ff7aa5",
          strokeWidth: 18,
          ease: "power2.inOut",
        },
        "-=0.7"
      )
      .to(
        logoPath,
        {
          duration: 0.9,
          morphSVG: { shape: "#morphPen", shapeIndex: "auto" },
          fill: "#120b22",
          stroke: "#db6482",
          strokeWidth: 16,
          ease: "power2.inOut",
        },
        "-=0.25"
      )
      .to(
        logoSvg,
        {
          rotate: 2,
          duration: 0.9,
          ease: "sine.inOut",
        },
        "<"
      )
      .to(
        logoPath,
        {
          duration: 0.9,
          morphSVG: { shape: "#morphHourglass", shapeIndex: "auto" },
          fill: "#0f0b1b",
          stroke: "#ff8ab2",
          strokeWidth: 17,
          ease: "power2.inOut",
        },
        "-=0.2"
      )
      .to(
        logoSvg,
        {
          rotate: 0,
          duration: 0.9,
          ease: "sine.inOut",
        },
        "<"
      )
      .to(
        logoPath,
        {
          duration: 0.95,
          morphSVG: { shape: "#morphCertificate", shapeIndex: "auto" },
          fill: "#100918",
          stroke: "#f7a75b",
          strokeWidth: 15,
          ease: "power2.inOut",
        },
        "-=0.15"
      )
      .to(
        logoSvg,
        {
          scale: 1,
          duration: 0.6,
          ease: "sine.inOut",
        },
        "<"
      )

      // 5 ─ Morph back to original logo SVG
      .to(
        logoPath,
        {
          duration: 1,
          morphSVG: { shape: originalPathD, shapeIndex: "auto" },
          fill: "#080615",
          stroke: "#db6482",
          strokeWidth: 16,
          ease: "power2.inOut",
        },
        "-=0.15"
      )
      .to(
        logoSvg,
        {
          scale: 1,
          rotate: 0,
          duration: 0.6,
          ease: "sine.inOut",
        },
        "<"
      )

      // 6 ─ Transition to PNG logo
      .to(
        logoSvg,
        {
          opacity: 0,
          scale: 0.98,
          filter: "blur(6px) brightness(0.85)",
          duration: 0.8,
          ease: "power2.inOut",
        },
        "+=0.15"
      )
      .to(
        logoPng,
        {
          opacity: 1,
          scale: 1,
          filter: "blur(0px) brightness(1)",
          duration: 0.9,
          ease: "power2.out",
        },
        "<0.1"
      )

      // 7 ─ Reflection, divider, and tagline
      .to(
        "#logoReflection",
        {
          opacity: 1,
          duration: 0.9,
          ease: "power2.inOut",
        },
        "-=0.5"
      )
      .to(
        "#divider",
        {
          opacity: 1,
          scaleX: 1,
          duration: 0.8,
          ease: "power3.inOut",
        },
        "-=0.4"
      )
      .to(
        line1Chars,
        {
          opacity: 1,
          y: 0,
          duration: 0.6,
          stagger: 0.05,
          ease: "back.out(1.7)",
        },
        "-=0.35"
      )
      .to(
        line2Chars,
        {
          opacity: 1,
          y: 0,
          duration: 0.6,
          stagger: 0.05,
          ease: "back.out(1.7)",
        },
        "-=0.5"
      )

      // 8 ─ Gentle logo breathe
      .to(logoPng, {
        scale: 1.03,
        duration: 2,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
      });
  </script>
